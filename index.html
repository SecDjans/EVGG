<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EVG 2026 - THE GAUNTLET</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@400;900&display=swap');
        body { background-color: #f8fafc; color: #0f172a; font-family: 'Roboto', sans-serif; -webkit-tap-highlight-color: transparent; }
        .military-font { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 0.1em; }
        .card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .btn-cat { transition: all 0.2s; border: 2px solid #e2e8f0; text-align: left; }
        .btn-cat:active { transform: scale(0.95); background-color: #f1f5f9; }
        .marie-photo { width: 60px; height: 60px; border-radius: 50%; border: 3px solid #0f172a; object-fit: cover; background: #fff; }
        .modal-bg { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); }
        .progress-circle { background: #0f172a; color: white; padding: 2px 10px; border-radius: 99px; font-weight: 900; font-size: 14px; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <header class="p-6 bg-white border-b border-slate-200 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <img src="marie.jpg" alt="LM" class="marie-photo" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="marie-photo flex items-center justify-center font-bold text-slate-400" style="display:none;">LM</div>
            <div>
                <h1 class="military-font text-2xl font-bold leading-none">POUR LE MEILLEUR</h1>
                <div class="flex items-center gap-2 mt-1">
                    <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Score :</span>
                    <span id="global-counter" class="progress-circle text-yellow-500">0</span>
                </div>
            </div>
        </div>
        <div class="text-[9px] text-right font-bold text-slate-400 uppercase leading-tight italic">
            "Ce qui se passe ici,<br>reste ici !"
        </div>
    </header>

    <main id="section-select" class="flex-1 p-6 flex flex-col items-center justify-center space-y-4">
        <div class="text-center mb-2">
            <p class="text-[11px] font-black text-slate-400 uppercase tracking-[0.3em] mb-1">Désigne ton co-pilote</p>
            <h2 class="military-font text-xl">Choisis le secteur :</h2>
        </div>

        <div class="w-full max-w-sm space-y-3">
            <button onclick="getRandomChallenge('SPORT')" class="btn-cat w-full p-5 rounded-2xl flex items-center gap-4 bg-blue-50 border-blue-200 shadow-sm shadow-blue-100">
                <span class="text-2xl">💪</span>
                <span class="font-black text-blue-800 uppercase text-sm tracking-widest">Secteur Sport</span>
            </button>

            <button onclick="getRandomChallenge('BAR')" class="btn-cat w-full p-5 rounded-2xl flex items-center gap-4 bg-orange-50 border-orange-200 shadow-sm shadow-orange-100">
                <span class="text-2xl">🍺</span>
                <span class="font-black text-orange-800 uppercase text-sm tracking-widest">Secteur Bar</span>
            </button>

            <button onclick="getRandomChallenge('SOCIAL')" class="btn-cat w-full p-5 rounded-2xl flex items-center gap-4 bg-purple-50 border-purple-200 shadow-sm shadow-purple-100">
                <span class="text-2xl">🤝</span>
                <span class="font-black text-purple-800 uppercase text-sm tracking-widest">Secteur Social</span>
            </button>

            <button onclick="getRandomChallenge('AMITIE')" class="btn-cat w-full p-5 rounded-2xl flex items-center gap-4 bg-emerald-50 border-emerald-200 shadow-sm shadow-emerald-100">
                <span class="text-2xl">🧠</span>
                <span class="font-black text-emerald-800 uppercase text-sm tracking-widest">Secteur Amitié</span>
            </button>

            <button onclick="getRandomChallenge('PHOTOS')" class="btn-cat w-full p-5 rounded-2xl flex items-center gap-4 bg-rose-50 border-rose-200 shadow-sm shadow-rose-100">
                <span class="text-2xl">📸</span>
                <span class="font-black text-rose-800 uppercase text-sm tracking-widest">Photos & Vidéos</span>
            </button>
        </div>
        
        <button onclick="confirmReset()" class="pt-8 text-[8px] font-bold text-slate-300 uppercase tracking-widest">Réinitialiser le compteur</button>
    </main>

    <div id="modal-challenge" class="hidden fixed inset-0 modal-bg flex items-center justify-center p-6 z-[100]">
        <div class="card w-full max-w-md p-8 text-center border-2 border-slate-900 shadow-2xl">
            <div id="modal-icon" class="text-5xl mb-4">📍</div>
            <p id="modal-cat" class="text-[10px] font-black text-slate-400 uppercase tracking-[0.4em] mb-6">CATEGORIE</p>
            <h3 id="modal-text" class="text-xl font-black leading-tight mb-8 min-h-[120px] flex items-center justify-center px-4 italic">...</h3>
            <div class="space-y-3">
                <button onclick="validateMission()" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-black text-lg uppercase tracking-widest active:scale-95 transition-transform shadow-lg">MISSION RÉUSSIE ✅</button>
                <button onclick="closeModal()" class="w-full py-3 bg-red-50 text-red-600 rounded-xl font-bold text-xs uppercase tracking-widest border border-red-100">ÉCHEC / ANNULER ❌</button>
            </div>
        </div>
    </div>

    <script>
        const challenges = {
            SPORT: [
                "Faire 20 pompes synchronisées avec ton co-pilote.",
                "Course de 20 mètres : le perdant porte le gagnant sur son dos.",
                "Faire une 'chaise' contre un mur : le premier qui lâche a un gage.",
                "Faire 15 squats en tenant les mains de ton co-pilote.",
                "Faire 10 sauts groupés (genoux poitrine) en même temps.",
                "Porter ton co-pilote en mode 'princesse' sur 10 mètres.",
                "Faire 30 secondes de gainage pendant que les autres comptent.",
                "Trouver un objet lourd et le soulever 10 fois à deux.",
                "Sprint de 50m : ton co-pilote te donne 5 secondes d'avance.",
                "Tenir en équilibre sur une jambe, face à face, le plus longtemps possible.",
                "Faire 20 montées de genoux ultra rapides ensemble.",
                "Faire un combat de 'pousse-mains' en équilibre sur une jambe.",
                "Réussir 5 pompes claquées (ou tentatives).",
                "Faire la brouette sur 10 mètres avec ton co-pilote.",
                "Faire 20 fentes sautées synchronisées.",
                "Tenir en planche, ton co-pilote doit te sauter par dessus 3 fois.",
                "Faire 10 burpees le plus vite possible.",
                "Essayer de toucher le plafond ou une branche haute en sautant.",
                "Faire 20 secondes de boxe imaginaire (shadow boxing) ensemble.",
                "Faire une course de chenille (assis l'un derrière l'autre) sur 5m.",
                "Course de reculons sur 20 mètres.",
                "Faire 10 pompes avec une seule main au sol (ou essayer).",
                "Tenir en équilibre 'avion' sur une jambe pendant 30 secondes.",
                "Sauter 10 fois le plus haut possible en criant un cri de guerre.",
                "Faire la course en sautant à cloche-pied sur 15 mètres."
            ],
            BAR: [
                "Prendre un shot cul-sec en même temps que ton co-pilote.",
                "Commander une boisson avec un accent étranger au choix.",
                "Boire votre verre sans jamais plier le coude (bras tendu).",
                "Donner un nom ridicule à la prochaine tournée.",
                "Faire un toast de 30 secondes en l'honneur de ton co-pilote.",
                "Boire uniquement avec votre main non-dominante pendant 10 min.",
                "Toucher le fond de votre verre avec le nez avant de le finir.",
                "Le groupe choisit une règle débile pour votre prochain verre.",
                "Pierre-Feuille-Ciseaux : le perdant finit le verre de l'autre.",
                "Commander deux verres en chuchotant de manière suspecte.",
                "Boire son verre cul-sec en gardant les yeux fermés.",
                "Faire semblant d'être un critique de vin/bière pour votre boisson.",
                "Demander au barman quelle est sa boisson la moins vendue et la goûter.",
                "Faire un check de verres 'complexe' avant chaque gorgée.",
                "Boire son verre à la paille le plus vite possible.",
                "Inventer une légende croate sur votre boisson actuelle.",
                "Faire un toast en rimes (min. 4 lignes).",
                "Finir son verre sans jamais le poser sur la table.",
                "Commander une boisson et la dégustez 'au ralenti' (slow-motion).",
                "Boire cul-sec un verre d'eau glacée."
            ],
            SOCIAL: [
                "Prendre un selfie avec un inconnu (co-pilote en arrière-plan).",
                "Faire un High Five à 3 inconnus différents.",
                "Demander à un inconnu qui est le plus beau gosse entre vous deux.",
                "Faire croire à quelqu'un que vous êtes des jumeaux séparés.",
                "Demander une recommandation de lieu et s'y rendre direct.",
                "Faire un compliment collectif à un passant.",
                "Réussir à faire crier 'Vive le Marié' à un groupe d'inconnus.",
                "Aborder quelqu'un et lui demander le secret d'une amitié longue.",
                "Faire une photo 'affiche de film' avec un inconnu.",
                "Convaincre quelqu'un que vous tournez un vlog voyage.",
                "Demander à un inconnu de vous apprendre un mot en croate.",
                "Faire une 'ola' avec au moins 2 inconnus dans un lieu public.",
                "Demander à quelqu'un son film préféré et pourquoi.",
                "Demander à un inconnu de choisir le prochain défi du groupe.",
                "Faire croire à quelqu'un que le Marié est une star de TikTok.",
                "Obtenir un autographe d'un inconnu sur un bout de serviette.",
                "Proposer un Pierre-Feuille-Ciseaux à un inconnu dans la rue.",
                "Faire une haie d'honneur pour un inconnu qui passe.",
                "Demander à une table voisine de porter un toast avec vous.",
                "Récupérer le nom et le prénom de 3 personnes croates différentes."
            ],
            AMITIE: [
                "Raconter à ton co-pilote ton meilleur souvenir avec lui.",
                "Citer une qualité que tu admires chez ton co-pilote.",
                "Raconter la pire bêtise que vous avez faite ensemble.",
                "Désigner qui est le plus 'casse-cou' entre vous deux.",
                "Expliquer ta première impression en rencontrant ton co-pilote.",
                "Raconter une anecdote de soirée épique vécue ensemble.",
                "Citer un point commun que vous seuls avez.",
                "Désigner ton co-pilote comme ton 'témoin de survie'.",
                "Raconter ton plus gros fou rire avec la personne à ta gauche.",
                "Donner un conseil de vie important à ton co-pilote.",
                "Dire ce que tu envies le plus (positivement) chez ton co-pilote.",
                "Raconter la fois où ton co-pilote t'a le plus impressionné.",
                "Si vous deviez monter un business ensemble, ce serait quoi ?",
                "Citer le défaut le plus drôle de ton co-pilote.",
                "Raconter une anecdote d'enfance que ton co-pilote ne connaît pas.",
                "Quel est le voyage que vous devez absolument faire ensemble un jour ?",
                "Dévoiler la chanson que vous chanteriez en duo au karaoké.",
                "Raconter votre rencontre la plus improbable.",
                "Qui de vous deux serait le premier à être arrêté en voyage ?",
                "Faire un pacte secret (débile) pour les 10 prochaines années."
            ],
            PHOTOS: [
                "Faire une photo 'couverture de magazine' avec ton co-pilote.",
                "Reproduire une scène de film culte en photo.",
                "Faire une photo de groupe façon équipe de foot.",
                "Faire une photo où tout le monde saute en même temps.",
                "Faire une photo 'album de vacances' avec des inconnus.",
                "Faire une photo où vous regardez tous dans une direction différente.",
                "Faire une photo 'avant / après soirée' (à refaire plus tard).",
                "Faire une photo ultra sérieuse… dans une situation ridicule.",
                "Faire une photo façon 'influenceur lifestyle'.",
                "Faire une photo avec un inconnu qui pose comme si c’était un pote.",
                "Faire une vidéo où vous annoncez une fausse breaking news.",
                "Faire une vidéo interview du marié.",
                "Faire une vidéo type vlog 'Bienvenue dans notre EVG'.",
                "Faire une vidéo où chacun dit un mot pour le futur marié.",
                "Faire une vidéo au ralenti en marchant comme des boss.",
                "Faire une photo avec un objet improbable trouvé autour de vous.",
                "Faire une photo 'spy team' (mode agents secrets).",
                "Faire une photo en mode 'gang'.",
                "Faire une photo romantique exagérée entre potes.",
                "Faire une photo où vous imitez une pub connue.",
                "Faire une vidéo où vous dansez tous ensemble.",
                "Faire une vidéo TikTok improvisée.",
                "Faire une vidéo où vous faites semblant d’être bourrés (même sobres).",
                "Faire une vidéo 'challenge débile' inventé sur le moment.",
                "Faire une photo avec le plus de monde possible dedans.",
                "Faire une photo où chacun fait une grimace différente.",
                "Faire une photo 'pyramide humaine'.",
                "Faire une photo où tout le monde porte quelqu’un.",
                "Faire une photo où vous imitez le marié.",
                "Faire une photo du marié en mode 'roi'.",
                "Faire une photo du marié porté par le groupe.",
                "Faire une vidéo où vous racontez votre meilleur souvenir avec le marié.",
                "Faire une vidéo message pour le futur (à regarder dans 5 ans).",
                "Faire une photo artistique (ombres, reflet, etc.).",
                "Faire une photo 'cinéma dramatique'.",
                "Faire une photo en noir et blanc stylée.",
                "Faire une vidéo 'présentation des joueurs' comme au foot.",
                "Faire une vidéo où chacun a un surnom ridicule.",
                "Faire une photo avec un maximum de sourires forcés.",
                "Faire une photo 'photo de famille'.",
                "Faire une photo 'classe de primaire'.",
                "Faire une vidéo où vous criez tous 'VIVE LE MARIÉ'.",
                "Faire une vidéo avec un cri de guerre inventé.",
                "Faire une photo avec quelqu’un qui ne comprend rien à ce qu’il se passe.",
                "Faire une photo en mode paparazzi du marié.",
                "Faire une photo 'moment épique' (comme une affiche de film).",
                "Faire une vidéo teaser de votre soirée."
            ]
        };

        const icons = { SPORT: "💪", BAR: "🍺", SOCIAL: "🤝", AMITIE: "🧠", PHOTOS: "📸" };
        let count = parseInt(localStorage.getItem('evg_gauntlet_score')) || 0;
        document.getElementById('global-counter').innerText = count;

        function getRandomChallenge(cat) {
            const list = challenges[cat];
            const challenge = list[Math.floor(Math.random() * list.length)];
            document.getElementById('modal-icon').innerText = icons[cat];
            document.getElementById('modal-cat').innerText = "SECTEUR " + cat;
            document.getElementById('modal-text').innerText = challenge;
            document.getElementById('modal-challenge').classList.remove('hidden');
        }

        function validateMission() {
            count++;
            localStorage.setItem('evg_gauntlet_score', count);
            document.getElementById('global-counter').innerText = count;
            closeModal();
        }

        function closeModal() {
            document.getElementById('modal-challenge').classList.add('hidden');
        }

        function confirmReset() {
            if(confirm("Réinitialiser le score à zéro ?")) {
                count = 0;
                localStorage.setItem('evg_gauntlet_score', 0);
                document.getElementById('global-counter').innerText = 0;
            }
        }
    </script>
</body>
</html>
